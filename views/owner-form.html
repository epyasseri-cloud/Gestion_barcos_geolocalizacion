<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Dueño - Sistema Geolocalización Barcos</title>
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/crud-shared.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        .container { max-width: 980px; margin: 0 auto; padding: 2rem; }
        h1 { color: #0a5f7f; margin-top: 0; }
        form { background: #fff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .full { grid-column: 1 / -1; }
        label { font-weight: 700; color: #264b5d; font-size: 0.92rem; }
        input, select, textarea { padding: 9px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #0a5f7f; box-shadow: 0 0 0 3px rgba(10,95,127,0.1); }
        textarea { resize: vertical; min-height: 80px; }
        .toolbar { display: flex; gap: 8px; margin-top: 16px; }
        button { padding: 8px 14px; border: 0; border-radius: 4px; background-color: #0a5f7f; color: #fff; cursor: pointer; font-size: 0.95rem; }
        button:hover { background-color: #1a7fa0; }
        .error-box { margin-top: 12px; padding: 10px; border-radius: 6px; background: #fee4e2; color: #b42318; display: none; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="crud-page">
    <div id="app-header-container"></div>

    <div class="container">
        <h1 id="formTitle">Nuevo Dueño</h1>

        <div class="toolbar" style="margin-bottom: 10px;">
            <button type="button" onclick="location.href='owners-list.html'">← Volver a la Lista</button>
        </div>

        <form id="ownerForm">
            <input type="hidden" id="ownerId">
            <div class="grid">
                <div class="field">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="field">
                    <label for="apellido">Apellido *</label>
                    <input type="text" id="apellido" name="apellido" required>
                </div>
                <div class="field">
                    <label for="documento">Documento *</label>
                    <input type="text" id="documento" name="documento" required>
                </div>
                <div class="field">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="field">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>
                <div class="field">
                    <label for="pais">País</label>
                    <select id="pais" name="pais">
                        <option value="">Seleccionar país</option>
                    </select>
                </div>
                <div class="field full">
                    <label for="direccion">Dirección</label>
                    <textarea id="direccion" name="direccion"></textarea>
                </div>
            </div>

            <div class="toolbar">
                <button type="submit">Guardar</button>
                <button type="button" onclick="location.href='owners-list.html'">Cancelar</button>
            </div>
            <div id="errorBox" class="error-box"></div>
        </form>
    </div>

    <div id="notificationContainer"></div>
    
    <script src="../auth/js/validation.js"></script>
    <script src="../auth/js/session.js"></script>
    <script src="../auth/js/auth.js"></script>
    <script src="../assets/js/header.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/notification.js"></script>
    <script src="../config/config.js"></script>
    <script src="../config/constants.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../utils/formatters.js"></script>
    <script src="../services/owner-service.js"></script>

    <script>
        // Verificar autenticación y permisos
        if (!Session.isActive()) {
            window.location.href = '../auth/views/login.html';
        }
        
        if (!Auth.checkPermission(['admin'])) {
            Notification.error('No tienes permisos para acceder a esta página');
            setTimeout(() => window.location.href = 'dashboard.html', 2000);
        }
        
        let isEditMode = false;
        let currentOwnerId = null;
        
        // Cargar países en el select
        function loadCountries() {
            const select = document.getElementById('pais');
            Constants.COUNTRIES.forEach(country => {
                const option = document.createElement('option');
                option.value = country;
                option.textContent = country;
                select.appendChild(option);
            });
        }
        
        // Verificar si es modo edición
        function checkEditMode() {
            const urlParams = new URLSearchParams(window.location.search);
            const ownerId = urlParams.get('id');
            
            if (ownerId) {
                isEditMode = true;
                currentOwnerId = ownerId;
                document.getElementById('formTitle').textContent = 'Editar Dueño';
                loadOwnerData(ownerId);
            }
        }
        
        // Cargar datos del dueño para editar
        function loadOwnerData(id) {
            const owner = OwnerService.getById(id);
            
            if (!owner) {
                Notification.error('Dueño no encontrado');
                setTimeout(() => location.href = 'owners-list.html', 2000);
                return;
            }
            
            document.getElementById('ownerId').value = owner.id;
            document.getElementById('nombre').value = owner.nombre;
            document.getElementById('apellido').value = owner.apellido;
            document.getElementById('documento').value = owner.documento;
            document.getElementById('email').value = owner.email;
            document.getElementById('telefono').value = owner.telefono || '';
            document.getElementById('direccion').value = owner.direccion || '';
            document.getElementById('pais').value = owner.pais || '';
        }
        
        // Manejar envío del formulario
        document.getElementById('ownerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                nombre: document.getElementById('nombre').value.trim(),
                apellido: document.getElementById('apellido').value.trim(),
                documento: document.getElementById('documento').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                direccion: document.getElementById('direccion').value.trim(),
                pais: document.getElementById('pais').value
            };
            
            let result;
            
            if (isEditMode) {
                result = OwnerService.update(currentOwnerId, formData);
            } else {
                result = OwnerService.create(formData);
            }
            
            if (result.success) {
                Notification.success(result.message);
                setTimeout(() => location.href = 'owners-list.html', 1500);
            } else {
                Notification.error(result.message);
            }
        });
        
        // Inicializar
        loadCountries();
        checkEditMode();
    </script>
</body>
</html>
