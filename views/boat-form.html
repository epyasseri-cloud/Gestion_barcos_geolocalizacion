<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Barco - Sistema Geolocalización Barcos</title>
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/crud-shared.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        .container { max-width: 980px; margin: 0 auto; padding: 2rem; }
        h1 { color: #0a5f7f; margin-top: 0; }
        form { background: #fff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .full { grid-column: 1 / -1; }
        label { font-weight: 700; color: #264b5d; font-size: 0.92rem; }
        input, select, textarea { padding: 9px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #0a5f7f; box-shadow: 0 0 0 3px rgba(10,95,127,0.1); }
        textarea { resize: vertical; min-height: 80px; }
        .toolbar { display: flex; gap: 8px; margin-top: 16px; }
        button { padding: 8px 14px; border: 0; border-radius: 4px; background-color: #0a5f7f; color: #fff; cursor: pointer; font-size: 0.95rem; }
        button:hover { background-color: #1a7fa0; }
        .muted { color: #666; font-size: 0.85rem; }
        .section-title { font-size: 1rem; font-weight: 700; color: #0a5f7f; margin: 18px 0 10px 0; padding-bottom: 6px; border-bottom: 2px solid #e0f0f5; }
        .error-box { margin-top: 12px; padding: 10px; border-radius: 6px; background: #fee4e2; color: #b42318; display: none; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="crud-page">
    <div id="app-header-container"></div>

    <div class="container">
        <h1 id="formTitle">Nuevo Barco</h1>

        <div class="toolbar" style="margin-bottom: 10px;">
            <button type="button" onclick="location.href='boats-list.html'">← Volver a Lista</button>
        </div>

        <form id="boatForm">
            <p class="section-title">Información del Barco</p>
            <div class="grid">
                <div class="field">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Nombre del barco">
                </div>
                <div class="field">
                    <label for="matricula">Matrícula *</label>
                    <input type="text" id="matricula" name="matricula" required placeholder="Ej: MAT-001">
                </div>
                <div class="field">
                    <label for="bandera">Bandera / País *</label>
                    <input type="text" id="bandera" name="bandera" required placeholder="Ej: España">
                </div>
                <div class="field">
                    <label for="tipo">Tipo *</label>
                    <select id="tipo" name="tipo" required>
                        <option value="">Seleccionar tipo...</option>
                        <option value="Pesquero">Pesquero</option>
                        <option value="Carga">Carga</option>
                        <option value="Pasajeros">Pasajeros</option>
                        <option value="Tanquero">Tanquero</option>
                        <option value="Portacontenedores">Portacontenedores</option>
                        <option value="Turístico">Turístico</option>
                    </select>
                </div>
                <div class="field">
                    <label for="capacidadToneladas">Capacidad (Toneladas)</label>
                    <input type="number" id="capacidadToneladas" name="capacidadToneladas" min="0" step="0.01" placeholder="0">
                </div>
                <div class="field">
                    <label for="anoFabricacion">Año de Fabricación</label>
                    <input type="number" id="anoFabricacion" name="anoFabricacion" min="1900" max="2026" placeholder="Ej: 2018">
                </div>
                <div class="field">
                    <label for="dueñoId">Dueño</label>
                    <select id="dueñoId" name="dueñoId">
                        <option value="">Sin dueño asignado</option>
                    </select>
                </div>
                <div class="field">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="Activo">Activo</option>
                        <option value="En Viaje">En Viaje</option>
                        <option value="En Mantenimiento">En Mantenimiento</option>
                        <option value="En Puerto">En Puerto</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
                <div class="field full">
                    <label for="fechaRegistro">Fecha de Registro</label>
                    <input type="date" id="fechaRegistro" name="fechaRegistro">
                </div>
            </div>

            <p class="section-title">Posición GPS Inicial (Opcional)</p>
            <div class="grid">
                <div class="field">
                    <label for="lat">Latitud</label>
                    <input type="number" id="lat" name="lat" step="0.000001" min="-90" max="90" value="0">
                </div>
                <div class="field">
                    <label for="lng">Longitud</label>
                    <input type="number" id="lng" name="lng" step="0.000001" min="-180" max="180" value="0">
                </div>
                <div class="field">
                    <label for="velocidad">Velocidad (nudos)</label>
                    <input type="number" id="velocidad" name="velocidad" min="0" step="0.1" value="0">
                </div>
            </div>

            <div class="toolbar">
                <button type="submit">Guardar Barco</button>
                <button type="button" onclick="location.href='boats-list.html'">Cancelar</button>
            </div>
            <div id="errorBox" class="error-box"></div>
        </form>
    </div>

    <div id="notificationContainer"></div>
    
    <script src="../auth/js/validation.js"></script>
    <script src="../auth/js/session.js"></script>
    <script src="../auth/js/auth.js"></script>
    <script src="../assets/js/header.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/notification.js"></script>
    <script src="../config/config.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../utils/formatters.js"></script>
    <script src="../services/boat-service.js"></script>
    <script src="../services/owner-service.js"></script>
    <script src="../services/employee-service.js"></script>

    <script>
        // Verificar autenticación
        if (!Session.isActive()) {
            window.location.href = '../auth/views/login.html';
        }
        
        // Obtener ID de barco desde URL (si existe)
        const urlParams = new URLSearchParams(window.location.search);
        const boatId = urlParams.get('id');
        const isEditMode = !!boatId;
        
        // Cargar dueños en el selector
        function loadOwnersSelector() {
            const owners = OwnerService.getAll();
            const select = document.getElementById('dueñoId');
            
            owners.forEach(owner => {
                const option = document.createElement('option');
                option.value = owner.id;
                option.textContent = `${owner.nombre} ${owner.apellido} (${owner.id})`;
                select.appendChild(option);
            });
        }
        
        // Cargar datos del barco si está en modo edición
        function loadBoatData() {
            if (!isEditMode) return;
            
            const boat = BoatService.getById(boatId);
            
            if (!boat) {
                Notification.error('Barco no encontrado');
                setTimeout(() => {
                    window.location.href = 'boats-list.html';
                }, 2000);
                return;
            }
            
            // Cambiar título
            document.getElementById('formTitle').textContent = `Editar Barco: ${boat.nombre}`;
            
            // Rellenar formulario
            document.getElementById('nombre').value = boat.nombre;
            document.getElementById('matricula').value = boat.matricula;
            document.getElementById('bandera').value = boat.bandera;
            document.getElementById('tipo').value = boat.tipo;
            document.getElementById('capacidadToneladas').value = boat.capacidadToneladas || 0;
            document.getElementById('anoFabricacion').value = boat.anoFabricacion || '';
            document.getElementById('dueñoId').value = boat.dueñoId || '';
            document.getElementById('estado').value = boat.estado;
            document.getElementById('fechaRegistro').value = boat.fechaRegistro || '';
            document.getElementById('lat').value = boat.lat || 0;
            document.getElementById('lng').value = boat.lng || 0;
            document.getElementById('velocidad').value = boat.velocidad || 0;
        }
        
        // Establecer fecha actual por defecto
        function setDefaultDate() {
            if (!isEditMode) {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('fechaRegistro').value = today;
            }
        }
        
        // Manejar envío del formulario
        document.getElementById('boatForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                nombre: document.getElementById('nombre').value.trim(),
                matricula: document.getElementById('matricula').value.trim(),
                bandera: document.getElementById('bandera').value.trim(),
                tipo: document.getElementById('tipo').value,
                capacidadToneladas: parseFloat(document.getElementById('capacidadToneladas').value) || 0,
                anoFabricacion: parseInt(document.getElementById('anoFabricacion').value) || new Date().getFullYear(),
                dueñoId: document.getElementById('dueñoId').value || null,
                estado: document.getElementById('estado').value,
                fechaRegistro: document.getElementById('fechaRegistro').value,
                lat: parseFloat(document.getElementById('lat').value) || 0,
                lng: parseFloat(document.getElementById('lng').value) || 0,
                velocidad: parseFloat(document.getElementById('velocidad').value) || 0
            };
            
            // Validaciones adicionales
            if (!formData.nombre || !formData.matricula || !formData.bandera) {
                Notification.error('Nombre, matrícula y bandera son obligatorios');
                return;
            }
            
            if (!formData.tipo) {
                Notification.error('El tipo de barco es obligatorio');
                return;
            }
            
            let result;
            
            if (isEditMode) {
                result = BoatService.update(boatId, formData);
            } else {
                result = BoatService.create(formData);
            }
            
            if (result.success) {
                Notification.success(result.message);
                setTimeout(() => {
                    window.location.href = 'boats-list.html';
                }, 1500);
            } else {
                Notification.error(result.message);
            }
        });
        
        // Inicializar
        loadOwnersSelector();
        setDefaultDate();
        loadBoatData();
    </script>
</body>
</html>
