<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Empleado - Sistema Geolocalización Barcos</title>
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/crud-shared.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        .container { max-width: 980px; margin: 0 auto; padding: 2rem; }
        h1 { color: #0a5f7f; margin-top: 0; }
        form { background: #fff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .full { grid-column: 1 / -1; }
        label { font-weight: 700; color: #264b5d; font-size: 0.92rem; }
        input, select, textarea { padding: 9px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #0a5f7f; box-shadow: 0 0 0 3px rgba(10,95,127,0.1); }
        textarea { resize: vertical; min-height: 80px; }
        .toolbar { display: flex; gap: 8px; margin-top: 16px; }
        button { padding: 8px 14px; border: 0; border-radius: 4px; background-color: #0a5f7f; color: #fff; cursor: pointer; font-size: 0.95rem; }
        button:hover { background-color: #1a7fa0; }
        .section-title { font-size: 1rem; font-weight: 700; color: #0a5f7f; margin: 18px 0 10px 0; padding-bottom: 6px; border-bottom: 2px solid #e0f0f5; }
        .error-box { margin-top: 12px; padding: 10px; border-radius: 6px; background: #fee4e2; color: #b42318; display: none; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="crud-page">
    <div id="app-header-container"></div>

    <div class="container">
        <h1 id="formTitle">Nuevo Empleado</h1>

        <div class="toolbar" style="margin-bottom: 10px;">
            <button type="button" onclick="location.href='employees-list.html'">← Volver a Lista</button>
        </div>

        <form id="employeeForm">
            <p class="section-title">Información Personal</p>
            <div class="grid">
                <div class="field">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                <div class="field">
                    <label for="apellido">Apellido *</label>
                    <input type="text" id="apellido" name="apellido" required>
                </div>
                <div class="field">
                    <label for="documento">Documento *</label>
                    <input type="text" id="documento" name="documento" required>
                </div>
                <div class="field">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="field">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono">
                </div>
                <div class="field">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" name="direccion">
                </div>
            </div>

            <p class="section-title">Información Laboral</p>
            <div class="grid">
                <div class="field">
                    <label for="rol">Rol *</label>
                    <select id="rol" name="rol" required>
                        <option value="">Seleccionar rol...</option>
                        <option value="Capitán">Capitán</option>
                        <option value="Oficial">Oficial</option>
                        <option value="Navegante">Navegante</option>
                        <option value="Ingeniero">Ingeniero</option>
                        <option value="Marinero">Marinero</option>
                        <option value="Cocinero">Cocinero</option>
                        <option value="Mecánico">Mecánico</option>
                        <option value="Electricista">Electricista</option>
                    </select>
                </div>
                <div class="field">
                    <label for="barcoAsignado">Barco Asignado</label>
                    <select id="barcoAsignado" name="barcoAsignado">
                        <option value="">Sin asignar</option>
                    </select>
                </div>
                <div class="field">
                    <label for="fechaContratacion">Fecha de Contratación *</label>
                    <input type="date" id="fechaContratacion" name="fechaContratacion" required>
                </div>
                <div class="field">
                    <label for="salario">Salario</label>
                    <input type="number" id="salario" name="salario" step="0.01" min="0">
                </div>
                <div class="field full">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
            </div>

            <div class="toolbar">
                <button type="submit">Guardar Empleado</button>
                <button type="button" onclick="location.href='employees-list.html'">Cancelar</button>
            </div>
            <div id="errorBox" class="error-box"></div>
        </form>
    </div>

    <div id="notificationContainer"></div>
    
    <script src="../auth/js/validation.js"></script>
    <script src="../auth/js/session.js"></script>
    <script src="../auth/js/auth.js"></script>
    <script src="../assets/js/header.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/notification.js"></script>
    <script src="../config/config.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../utils/formatters.js"></script>
    <script src="../services/employee-service.js"></script>
    <script src="../services/boat-service.js"></script>

    <script>
        // Verificar autenticación
        if (!Session.isActive()) {
            window.location.href = '../auth/views/login.html';
        }
        

        // Obtener ID de empleado desde URL (si existe)
        const urlParams = new URLSearchParams(window.location.search);
        const employeeId = urlParams.get('id');
        const isEditMode = !!employeeId;
        
        // Cargar barcos en el selector
        function loadBoatsSelector() {
            const boats = BoatService.getAll();
            const select = document.getElementById('barcoAsignado');
            
            boats.forEach(boat => {
                const option = document.createElement('option');
                option.value = boat.id;
                option.textContent = `${boat.nombre} (${boat.id})`;
                select.appendChild(option);
            });
        }
        
        // Cargar datos del empleado si está en modo edición
        function loadEmployeeData() {
            if (!isEditMode) return;
            
            const employee = EmployeeService.getById(employeeId);
            
            if (!employee) {
                Notification.error('Empleado no encontrado');
                setTimeout(() => {
                    window.location.href = 'employees-list.html';
                }, 2000);
                return;
            }
            
            // Cambiar título
            document.getElementById('formTitle').textContent = `Editar Empleado: ${employee.nombre} ${employee.apellido}`;
            
            // Rellenar formulario
            document.getElementById('nombre').value = employee.nombre;
            document.getElementById('apellido').value = employee.apellido;
            document.getElementById('documento').value = employee.documento;
            document.getElementById('email').value = employee.email;
            document.getElementById('telefono').value = employee.telefono || '';
            document.getElementById('direccion').value = employee.direccion || '';
            document.getElementById('rol').value = employee.rol;
            document.getElementById('barcoAsignado').value = employee.barcoAsignado || '';
            document.getElementById('fechaContratacion').value = employee.fechaContratacion;
            document.getElementById('salario').value = employee.salario || 0;
            document.getElementById('estado').value = employee.estado;
        }
        
        // Establecer fecha actual por defecto
        function setDefaultDate() {
            if (!isEditMode) {
                const today = new Date().toISOString().split('T')[0];
                document.getElementById('fechaContratacion').value = today;
            }
        }
        
        // Manejar envío del formulario
        document.getElementById('employeeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                nombre: document.getElementById('nombre').value.trim(),
                apellido: document.getElementById('apellido').value.trim(),
                documento: document.getElementById('documento').value.trim(),
                email: document.getElementById('email').value.trim(),
                telefono: document.getElementById('telefono').value.trim(),
                direccion: document.getElementById('direccion').value.trim(),
                rol: document.getElementById('rol').value,
                barcoAsignado: document.getElementById('barcoAsignado').value || null,
                fechaContratacion: document.getElementById('fechaContratacion').value,
                salario: parseFloat(document.getElementById('salario').value) || 0,
                estado: document.getElementById('estado').value
            };
            
            // Validaciones adicionales
            if (!formData.nombre || !formData.apellido) {
                Notification.error('Nombre y apellido son obligatorios');
                return;
            }
            
            if (!Validator.isValidEmail(formData.email)) {
                Notification.error('Email inválido');
                return;
            }
            
            if (!formData.documento) {
                Notification.error('Documento es obligatorio');
                return;
            }
            
            let result;
            
            if (isEditMode) {
                result = EmployeeService.update(employeeId, formData);
            } else {
                result = EmployeeService.create(formData);
            }
            
            if (result.success) {
                Notification.success(result.message);
                setTimeout(() => {
                    window.location.href = 'employees-list.html';
                }, 1500);
            } else {
                Notification.error(result.message);
            }
        });
        
        // Inicializar
        loadBoatsSelector();
        setDefaultDate();
        loadEmployeeData();
    </script>
</body>
</html>
