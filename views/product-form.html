<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Producto - Sistema Geolocalización Barcos</title>
    <link rel="stylesheet" href="../assets/css/header.css">
    <link rel="stylesheet" href="../assets/css/crud-shared.css">
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; }
        .container { max-width: 980px; margin: 0 auto; padding: 2rem; }
        h1 { color: #0a5f7f; margin-top: 0; }
        form { background: #fff; padding: 1.5rem; border-radius: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .field { display: flex; flex-direction: column; gap: 4px; }
        .full { grid-column: 1 / -1; }
        label { font-weight: 700; color: #264b5d; font-size: 0.92rem; }
        input, select, textarea { padding: 9px; border: 1px solid #ddd; border-radius: 4px; font-size: 0.95rem; width: 100%; box-sizing: border-box; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #0a5f7f; box-shadow: 0 0 0 3px rgba(10,95,127,0.1); }
        textarea { resize: vertical; min-height: 80px; }
        .toolbar { display: flex; gap: 8px; margin-top: 16px; }
        button { padding: 8px 14px; border: 0; border-radius: 4px; background-color: #0a5f7f; color: #fff; cursor: pointer; font-size: 0.95rem; }
        button:hover { background-color: #1a7fa0; }
        .muted { color: #666; font-size: 0.85rem; }
        .error-box { margin-top: 12px; padding: 10px; border-radius: 6px; background: #fee4e2; color: #b42318; display: none; }
        @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body class="crud-page">
    <div id="app-header-container"></div>

    <div class="container">
        <h1 id="formTitle">Nuevo Producto</h1>

        <div class="toolbar" style="margin-bottom: 10px;">
            <button type="button" onclick="location.href='products-list.html'">← Volver a Lista</button>
        </div>

        <form id="productForm">
            <div class="grid">
                <div class="field full">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Nombre del producto">
                </div>
                <div class="field">
                    <label for="categoria">Categoría (Nomenclatura) *</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Seleccionar categoría...</option>
                        <option value="Primaria">Primaria</option>
                        <option value="Manufactura">Manufactura</option>
                    </select>
                    <span class="muted">Primaria: producto base · Manufactura: procesado</span>
                </div>
                <div class="field">
                    <label for="unidadMedida">Unidad de Medida *</label>
                    <select id="unidadMedida" name="unidadMedida" required>
                        <option value="">Seleccionar unidad...</option>
                        <option value="Kg">Kg</option>
                        <option value="Ton">Ton</option>
                        <option value="Lata">Lata</option>
                        <option value="Caja">Caja</option>
                        <option value="Paquete">Paquete</option>
                        <option value="Unidad">Unidad</option>
                        <option value="Litro">Litro</option>
                    </select>
                </div>
                <div class="field">
                    <label for="precioUnitario">Precio Unitario</label>
                    <input type="number" id="precioUnitario" name="precioUnitario" step="0.01" min="0" value="0">
                </div>
                <div class="field">
                    <label for="stock">Stock Inicial</label>
                    <input type="number" id="stock" name="stock" min="0" value="0">
                </div>
                <div class="field">
                    <label for="estado">Estado</label>
                    <select id="estado" name="estado">
                        <option value="Activo">Activo</option>
                        <option value="Inactivo">Inactivo</option>
                    </select>
                </div>
                <div class="field full">
                    <label for="descripcion">Descripción</label>
                    <textarea id="descripcion" name="descripcion" placeholder="Descripción del producto..."></textarea>
                </div>
            </div>

            <div class="toolbar">
                <button type="submit">Guardar Producto</button>
                <button type="button" onclick="location.href='products-list.html'">Cancelar</button>
            </div>
            <div id="errorBox" class="error-box"></div>
        </form>
    </div>

    <div id="notificationContainer"></div>
    
    <script src="../auth/js/validation.js"></script>
    <script src="../auth/js/session.js"></script>
    <script src="../auth/js/auth.js"></script>
    <script src="../assets/js/header.js"></script>
    <script src="../components/navbar.js"></script>
    <script src="../components/notification.js"></script>
    <script src="../config/config.js"></script>
    <script src="../utils/helpers.js"></script>
    <script src="../utils/formatters.js"></script>
    <script src="../services/product-service.js"></script>

    <script>
        // Verificar autenticación
        if (!Session.isActive()) {
            window.location.href = '../auth/views/login.html';
        }
        

        // Obtener ID de producto desde URL (si existe)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');
        const isEditMode = !!productId;
        
        // Cargar datos del producto si está en modo edición
        function loadProductData() {
            if (!isEditMode) return;
            
            const product = ProductService.getById(productId);
            
            if (!product) {
                Notification.error('Producto no encontrado');
                setTimeout(() => {
                    window.location.href = 'products-list.html';
                }, 2000);
                return;
            }
            
            // Cambiar título
            document.getElementById('formTitle').textContent = `Editar Producto: ${product.nombre}`;
            
            // Rellenar formulario
            document.getElementById('nombre').value = product.nombre;
            document.getElementById('categoria').value = product.categoria;
            document.getElementById('descripcion').value = product.descripcion || '';
            document.getElementById('unidadMedida').value = product.unidadMedida;
            document.getElementById('precioUnitario').value = product.precioUnitario || 0;
            document.getElementById('stock').value = product.stock || 0;
            document.getElementById('estado').value = product.estado;
        }
        
        // Manejar envío del formulario
        document.getElementById('productForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = {
                nombre: document.getElementById('nombre').value.trim(),
                categoria: document.getElementById('categoria').value,
                descripcion: document.getElementById('descripcion').value.trim(),
                unidadMedida: document.getElementById('unidadMedida').value,
                precioUnitario: parseFloat(document.getElementById('precioUnitario').value) || 0,
                stock: parseInt(document.getElementById('stock').value) || 0,
                estado: document.getElementById('estado').value
            };
            
            // Validaciones adicionales
            if (!formData.nombre) {
                Notification.error('El nombre es obligatorio');
                return;
            }
            
            if (!formData.categoria) {
                Notification.error('La categoría es obligatoria');
                return;
            }
            
            if (!formData.unidadMedida) {
                Notification.error('La unidad de medida es obligatoria');
                return;
            }
            
            let result;
            
            if (isEditMode) {
                result = ProductService.update(productId, formData);
            } else {
                result = ProductService.create(formData);
            }
            
            if (result.success) {
                Notification.success(result.message);
                setTimeout(() => {
                    window.location.href = 'products-list.html';
                }, 1500);
            } else {
                Notification.error(result.message);
            }
        });
        
        // Inicializar
        loadProductData();
    </script>
</body>
</html>
