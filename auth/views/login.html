<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema Geolocalización Barcos</title>
</head>
<body>
    <h1>Iniciar Sesión</h1>
    
    <form id="loginForm">
        <div>
            <label for="email">Email:</label><br>
            <input type="email" id="email" name="email" required>
        </div>
        
        <div>
            <label for="password">Contraseña:</label><br>
            <input type="password" id="password" name="password" required>
        </div>
        
        <div>
            <label for="role">Rol:</label><br>
            <select id="role" name="role" required>
                <option value="">Seleccionar rol</option>
                <option value="admin">Admin System</option>
                <option value="tripulacion">Tripulación</option>
                <option value="supervisor">Supervisor de Carga</option>
                <option value="gerente_operaciones">Gerente de Operaciones</option>
                <option value="gerente_finanzas">Gerente de Finanzas</option>
            </select>
        </div>
        
        <br>
        <button type="submit">Iniciar Sesión</button>
    </form>
    
    <br>
    <p>¿No tienes cuenta? <a href="register.html">Registrarse</a></p>
    
    <div id="message"></div>
    
    <script src="../js/validation.js"></script>
    <script src="../js/session.js"></script>
    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const result = Auth.login(email, password, role);
            
            if (result.success) {
                document.getElementById('message').innerHTML = '<p style="color: green;">Login exitoso. Redirigiendo...</p>';
                setTimeout(() => {
                    window.location.href = '../../views/dashboard.html';
                }, 1000);
            } else {
                document.getElementById('message').innerHTML = '<p style="color: red;">' + result.message + '</p>';
            }
        });
    </script>
</body>
</html>
